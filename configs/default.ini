[audio]
sample_rate_hz=48000
frames_per_buffer=480
input_channels=1
output_channels=1
input_device_id=-1
output_device_id=-1
input_ring_capacity=1024
output_ring_capacity=2048

[asr]
backend=whisper_stub
model_path=models/whisper-small.bin
enable_gpu=true
chunk_ms=640
hop_ms=240
stability_threshold=0.72
force_commit_ms=450

[tts]
backend=onnx_stub
model_path=models/xttsv2.onnx
speaker_reference=configs/voice_reference.wav
enable_gpu=true
queue_capacity=128
stale_after_ms=2500
backlog_soft_limit=32

[queues]
ingest_to_asr_capacity=128
asr_to_commit_capacity=128
commit_to_tts_capacity=128

[domain]
technical_glossary=FastAPI,PostgreSQL,Redis,Kubernetes,Terraform,CI/CD,Docker,observability,tracing,rate limiting,idempotency,event-driven,async,throughput,latency,SLO,SLA,pipeline,deployment,production-ready
frequent_phrases=let's review the architecture,production incident,database migration,latency budget
session_terms_limit=64

[runtime]
use_simulated_audio=true
run_duration_seconds=10
log_level=info
