# =============================================================================
# VoicePipeline — main configuration file
# Format: TOML  |  See README for full description of all options
# =============================================================================

[audio]
input_device       = "default"
output_device      = "virtual_mic"
sample_rate        = 16000
frame_size         = 240
channels           = 1
input_ring_capacity  = 16384
output_ring_capacity = 2048

[vad]
# Hybrid VAD + timeout chunking strategy.
# Supported values in the current build:
# engine = "webrtcvad" requires MEV_ENABLE_WEBRTCVAD=ON (libfvad)
# engine = "none"      falls back to fixed-window chunking (legacy behaviour)
engine               = "none"
threshold            = 0.5
silence_duration_ms  = 300
max_chunk_duration_ms = 3000
leading_pad_ms       = 200
trailing_pad_ms      = 300

[asr]
engine             = "whisper"
model_path         = "models/ggml-small.bin"
language           = "es"
translate          = true              # whisper translate mode: Spanish → English
beam_size          = 1                 # greedy — lowest latency for MVP
gpu_enabled        = true
quantization       = "f16"             # "f16" (GPU), "q5_1" (CPU fallback), "q8_0"
use_domain_prompt  = true
max_context_tokens = 224
# Latency-first rolling chunking (used when vad.engine = "none")
chunk_ms           = 120
hop_ms             = 60
stability_threshold = 0.65
force_commit_ms    = 180

[tts]
engine             = "stub"            # "piper" | "espeak" | "stub"
mode               = "interactive_balanced"
model_path         = "models/en_US-lessac-medium.onnx"
piper_data_path    = "models/en_US-lessac-medium.onnx.json"
speaker_id         = 0
gpu_enabled        = true
output_sample_rate = 22050
fallback_engine    = "espeak"
preview_engine     = "espeak"
max_primary_tts_budget_ms = 180

[tts.pronunciation_hints]
enabled   = true
hints_path = "config/pronunciation_hints.toml"

[pipeline]
max_queue_depth       = 4
drop_policy           = "drop_oldest"  # "drop_oldest" | "coalesce" | "none"
max_latency_ms        = 3000
warning_threshold_ms  = 1200
critical_threshold_ms = 2200
stale_after_n_newer   = 1
stale_after_ms        = 1200

[queues]
ingest_to_asr_capacity = 32
asr_to_text_capacity   = 32
text_to_tts_capacity   = 32

[gpu]
enabled                        = true
device_id                      = 0
asr_priority                   = true
tts_cpu_fallback_on_contention = true

[domain]
glossary_path           = "config/tech_glossary.toml"
session_terms_enabled   = true
pronunciation_hints     = true
pronunciation_hints_path = "config/pronunciation_hints.toml"
initial_prompt_template = "Technical meeting about {topics}. Use simple English."

[resilience]
enable_degradation          = true
gpu_failure_action          = "fallback_cpu"   # "fallback_cpu" | "shutdown"
passthrough_on_total_failure = true

[logging]
level   = "info"           # "debug" | "info" | "warn" | "error"
file    = "logs/pipeline.log"
console = true
async   = true

[telemetry]
enabled             = true
report_interval_ms  = 5000
log_per_utterance   = true

# Internal runtime parameters (not shown in user docs)
[runtime]
use_simulated_audio  = true
run_duration_seconds = 20
