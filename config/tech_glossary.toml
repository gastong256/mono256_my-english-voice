# =============================================================================
# Technical Domain Glossary
#
# [corrections]   — ASR post-processing: what Whisper may produce → correct term
# [pronunciation] — TTS pre-processing: term → how to pronounce it
# [domain_terms]  — Terms included in Whisper initial_prompt for domain biasing
# [frequent_phrases] — Common interview phrases (reserved for future prompting)
# =============================================================================

[corrections]
# Common Whisper mis-transcriptions for Spanish-accented English tech speech.
# Keys are lowercased for case-insensitive matching.
"post-grass"        = "PostgreSQL"
"post grass"        = "PostgreSQL"
"post gray sql"     = "PostgreSQL"
"postgres"          = "PostgreSQL"
"cube ctl"          = "kubectl"
"cube cuddle"       = "kubectl"
"cube control"      = "kubectl"
"kube ctl"          = "kubectl"
"doctor"            = "Docker"
"terra farm"        = "Terraform"
"terra form"        = "Terraform"
"fast api"          = "FastAPI"
"read is"           = "Redis"
"red is"            = "Redis"
"cube ernet ease"   = "Kubernetes"
"cube net ease"     = "Kubernetes"
"kubernetes ease"   = "Kubernetes"
"engine x"          = "nginx"
"engine ex"         = "nginx"
"jay son"           = "JSON"
"ci cd"             = "CI/CD"
"ci slash cd"       = "CI/CD"
"s l o"             = "SLO"
"s l a"             = "SLA"
"my sequel"         = "MySQL"
"elastic search"    = "Elasticsearch"
"rabbit mq"         = "RabbitMQ"
"rabbit queue"      = "RabbitMQ"
"kafka"             = "Kafka"

[pronunciation]
# Pronunciation hints applied pre-TTS to make synthesized speech natural.
# Term (as it appears after ASR correction) → how TTS should speak it.
"kubectl"       = "kube control"
"nginx"         = "engine X"
"PostgreSQL"    = "post gres Q L"
"CI/CD"         = "C I C D"
"async"         = "ay-sync"
"k8s"           = "kubernetes"
"SLO"           = "S L O"
"SLA"           = "S L A"
"gRPC"          = "G R P C"
"OAuth"         = "O Auth"
"DevOps"        = "dev ops"
"IaC"           = "infrastructure as code"
"YAML"          = "yamel"
"FastAPI"       = "fast A P I"
"RabbitMQ"      = "rabbit M Q"
"Elasticsearch" = "elastic search"
"MySQL"         = "my S Q L"
"NoSQL"         = "no S Q L"
"Redis"         = "red iss"
"load balancer" = "load balancer"
"rate limiting" = "rate limiting"
"dead letter queue" = "dead letter queue"

[preferred_translations]
# Post-ASR normalization towards short, understandable technical English.
"we are going to" = "we will"
"we're going to" = "we'll"
"in order to" = "to"
"let me walk you through" = "let me explain"
"the way I would approach this" = "I would do this"
"from a scalability perspective" = "for scalability"
"in terms of performance" = "for performance"
"the bottleneck here is" = "the bottleneck is"
"the architecture looks like" = "the architecture is"
"we can optimize this by" = "we can improve this by"
"high latency issue" = "high latency"
"message broker" = "message queue"
"dead-letter queue" = "dead letter queue"
"rate-limit" = "rate limiting"

[domain_terms]
# Compact term set for low-latency prompting in technical meetings.
terms = [
    "PostgreSQL", "Redis", "Kubernetes", "FastAPI", "Docker",
    "Terraform", "CI/CD", "latency", "throughput", "SLO",
    "rate limiting", "load balancer", "message queue",
    "dead letter queue", "database migration", "deployment", "RabbitMQ",
]

[frequent_phrases]
# Short phrases that are likely to appear in the target meeting domain.
phrases = [
    "review the architecture",
    "high latency",
    "database migration",
    "deploy to production",
    "scale the service",
    "fix the bottleneck",
    "reduce response time",
    "keep the system stable",
]
